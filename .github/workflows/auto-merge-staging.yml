name: Auto-merge PRs to Staging

on:
  pull_request:
    branches:
      - staging
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'julwrites'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge for PR
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
