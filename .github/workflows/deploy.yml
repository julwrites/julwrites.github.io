name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to `main` or `staging`
  push:
    branches: [ main, staging ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:
  
# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      # 1. Checkout and build main
      - name: Checkout main branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: main
          path: main-branch

      - name: Build main branch
        if: ${{ hashFiles('main-branch') != '' }}
        working-directory: ./main-branch
        run: |
          pnpm install
          pnpm build

      # 2. Checkout and build staging
      - name: Checkout staging branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: staging
          path: staging-branch

      - name: Build staging branch
        if: ${{ hashFiles('staging-branch') != '' }}
        working-directory: ./staging-branch
        run: |
          pnpm install
          ASTRO_BASE=/staging pnpm build

      # 3. Combine outputs
      - name: Combine outputs
        run: |
          mkdir -p final-dist
          if [ -d "main-branch/dist" ]; then
            cp -r main-branch/dist/* final-dist/
          fi
          if [ -d "staging-branch/dist" ]; then
            mkdir -p final-dist/staging
            cp -r staging-branch/dist/* final-dist/staging/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
